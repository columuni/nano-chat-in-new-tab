<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nano Chat in New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --border: #2a2a30;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.18);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-dim: #44445a;
      --result-bg: #14141a;
      --success: #4ecdc4;
      --warning: #f7b731;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
	  overflow-x: hidden;
      overflow-y: auto;
    }

    /* 背景グリッド */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 720px;
	  margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 40px 20px 20px;
      position: relative;
      z-index: 1;
    }

    /* ヘッダー */
    .header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .clock {
      font-family: 'DM Mono', monospace;
      font-size: 52px;
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .date {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    /* 検索エリア */
    .search-wrapper {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 720px;
      padding-top: 12px;
      background: var(--bg);
      z-index: 100;
    }

    .search-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 56px 18px 22px;
      font-size: 15px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
      min-height: 60px;
      max-height: 180px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .search-box::placeholder { color: var(--text-dim); }

    .search-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow), 0 4px 24px rgba(0,0,0,0.3);
    }

    .send-btn {
      position: absolute;
      right: 14px;
      bottom: 18px;
      width: 32px;
      height: 32px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      opacity: 0.9;
    }

    .send-btn:hover { opacity: 1; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 14px; height: 14px; fill: white; }

    /* ステータスバー */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .status-dot.ready { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
    .status-dot.error { background: #ff6b6b; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 会話エリア */
   .conversation {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-bottom: 180px;
	  overflow-y: visible;
    }

    .message {
      animation: fadeUp 0.35s ease both;
    }

    /* ユーザーメッセージ */
    .message.user {
      display: flex;
      justify-content: flex-end;
    }

    .message.user .bubble {
      background: var(--accent);
      color: white;
      padding: 12px 18px;
      border-radius: 18px 18px 4px 18px;
      max-width: 80%;
      font-size: 14px;
	  font-family: 'Noto Sans JP', sans-serif;
      line-height: 1.6;
      font-weight: 400;
    }

    /* AIメッセージ */
    .message.ai .ai-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ai-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .ai-divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* 検索中インジケーター */
    .searching-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .searching-dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .searching-dots span:nth-child(2) { animation-delay: 0.2s; }
    .searching-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* 検索結果リスト */
    .search-results {
      margin-bottom: 16px;
    }

    .search-results-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      background: var(--result-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      text-decoration: none;
      transition: border-color 0.15s;
    }

    .result-item:hover { border-color: var(--accent); }

    .result-num {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      min-width: 16px;
      margin-top: 2px;
    }

    .result-content { flex: 1; min-width: 0; }

    .result-title {
      font-size: 13px;
	  font-family: 'Noto Sans JP', sans-serif;
      color: var(--text-primary);
      font-weight: 400;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-url {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* AI回答 */
    .ai-answer {
      font-size: 14px;
	  font-family: 'Noto Sans JP', sans-serif;
      line-height: 1.85;
      color: var(--text-primary);
      font-weight: 300;
      white-space: pre-wrap;
    }

    .ai-answer.streaming::after {
      content: '▋';
      color: var(--accent);
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* エラー */
    .error-msg {
      padding: 14px 18px;
      background: rgba(255, 107, 107, 0.08);
      border: 1px solid rgba(255, 107, 107, 0.2);
      border-radius: 10px;
      font-size: 13px;
      color: #ff8080;
      line-height: 1.6;
    }

    /* Google検索へのリンク */
    .google-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      transition: all 0.15s;
    }

    .google-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* スクロールバー */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Nano Chat in New Tab</div>
      <div class="clock" id="clock">00:00</div>
      <div class="date" id="date"></div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Gemini Nanoを確認中...</span>
    </div>

    <div class="conversation" id="conversation"></div>

    <div class="search-wrapper">
      <textarea
        class="search-box"
        id="searchInput"
        placeholder="何でも聞いてください..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 16 16"><path d="M1 8L15 1 8 15 7 9z"/></svg>
      </button>
    </div>

  </div>

  <script src="nanochat.js"></script>
</body>
</html>
